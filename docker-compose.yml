services:
  bot:
    image: ghcr.io/karilaa-dev/ai-matrix-bot:latest
    build:
      context: .
      args:
        CODEX_RELEASE: "0.144.0"
    env_file:
      - path: .env
        required: false
    volumes:
      - bot-data:/app/data
    healthcheck:
      test: ["CMD", "npm", "run", "health", "--silent"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  bot-data:
