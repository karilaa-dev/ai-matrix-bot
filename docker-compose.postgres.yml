services:
  bot:
    environment:
      CORE_DATABASE_URL: "postgres://ai_matrix_bot:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/ai_matrix_bot"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ai_matrix_bot
      POSTGRES_USER: ai_matrix_bot
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres-data:
