name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run check
      - run: npm test
      - run: npm run build

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ai-matrix-bot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Validate Compose models
        env:
          POSTGRES_PASSWORD: ci-only-password
        run: |
          mkdir -p secrets
          touch secrets/matrix_access_token secrets/matrix_recovery_key
          docker compose config --quiet
          docker compose -f docker-compose.yml -f docker-compose.postgres.yml config --quiet

  matrix-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:integration:matrix
