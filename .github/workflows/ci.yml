name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run check
      - run: npm test
      - run: npm run test:deployment
      - run: npm run build

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ai-matrix-bot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Validate image runtime metadata
        run: |
          docker image inspect ai-matrix-bot:ci --format '{{json .Config}}' | \
            jq -e '(.User == "node") and (.Healthcheck.Test != null) and ([.Env[] | select(startswith("MATRIX_ACCESS_TOKEN=") or startswith("MATRIX_ACCESS_TOKEN_FILE=") or startswith("MATRIX_PASSWORD=") or startswith("MATRIX_ENCRYPTION_SECRET=") or startswith("MATRIX_ENCRYPTION_SECRET_FILE=") or startswith("MATRIX_RECOVERY_KEY=") or startswith("MATRIX_RECOVERY_KEY_FILE=") or startswith("DOCLING_URL="))] | length == 0)'
          docker run --rm --entrypoint node ai-matrix-bot:ci -e \
            'Promise.all([import("@matrix-org/matrix-sdk-crypto-nodejs"), import("./dist/config.js"), import("./dist/core/environment.js")]).then(() => console.log("runtime-imports-ok"))'
      - name: Validate Compose models
        env:
          MATRIX_HOMESERVER_URL: https://matrix.example.org
          MATRIX_OWNER_ID: "@owner:example.org"
          MATRIX_ACCESS_TOKEN: ci-only-matrix-token
          MATRIX_ENCRYPTION_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          POSTGRES_PASSWORD: ci-only-password
        run: |
          test "$(docker compose config --services)" = "bot"
          docker compose config --quiet
          test "$(docker compose -f docker-compose.yml -f docker-compose.postgres.yml config --services | sort | tr '\n' ' ')" = "bot postgres "
          docker compose -f docker-compose.yml -f docker-compose.postgres.yml config --quiet

  matrix-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:integration:matrix
