name: Publish container

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-container-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: karilaa-dev/ai-matrix-bot

jobs:
  verify:
    name: Check and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

      - name: Validate deployment artifacts
        env:
          MATRIX_HOMESERVER_URL: https://matrix.example.org
          MATRIX_BOT_USER_ID: "@bot:example.org"
          MATRIX_OWNER_ID: "@owner:example.org"
          MATRIX_ACCESS_TOKEN: publish-validation-token
          MATRIX_RECOVERY_KEY: publish-validation-recovery-key
          DOCLING_URL: http://docling.example.org:5001
          POSTGRES_PASSWORD: publish-validation-password
        run: |
          npm run test:deployment
          test "$(docker compose config --services)" = "bot"
          docker compose config --quiet
          test "$(docker compose -f docker-compose.yml -f docker-compose.postgres.yml config --services | sort | tr '\n' ' ')" = "bot postgres "
          docker compose -f docker-compose.yml -f docker-compose.postgres.yml config --quiet

      - name: Validate production image runtime
        run: |
          docker build -t ai-matrix-bot:publish-validation .
          docker image inspect ai-matrix-bot:publish-validation --format '{{json .Config}}' | \
            jq -e '(.User == "node") and (.Healthcheck.Test != null) and ([.Env[] | select(startswith("MATRIX_ACCESS_TOKEN_FILE=") or startswith("MATRIX_RECOVERY_KEY_FILE=") or startswith("DOCLING_URL="))] | length == 0)'
          docker run --rm --entrypoint node ai-matrix-bot:publish-validation -e \
            'Promise.all([import("@matrix-org/matrix-sdk-crypto-nodejs"), import("./dist/config.js"), import("./dist/core/environment.js")]).then(() => console.log("runtime-imports-ok"))'

  matrix-integration:
    name: Matrix integration
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run disposable Matrix suite
        run: npm run test:integration:matrix

  publish:
    name: Build and publish
    needs:
      - verify
      - matrix-integration
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=long

      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
